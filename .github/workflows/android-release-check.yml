name: Android Release Check

# No-secrets release verification lane. It compiles, lints, tests, and packages
# an explicitly unsigned/non-publishable release-check APK. Production signing
# remains an operator-only local action and no signing inputs enter GitHub.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Mondays 07:00 UTC — weekly safety net even if main is quiet.
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: android-release-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-unsigned-release:
    name: Verify unsigned release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: always

      - name: Verify unsigned non-publishable release
        run: .\gradlew.bat :app:verifyUnsignedRelease --no-daemon --build-cache

      - name: Test release signing lane boundaries
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\test-release-signing-lanes.ps1
