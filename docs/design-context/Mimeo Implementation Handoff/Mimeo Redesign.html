    html, body { margin:0; padding:0; background:#F4EFE7; }
    body { font-family:"Inter", system-ui, sans-serif; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
    .mimeo-scroll::-webkit-scrollbar { width:0; height:0; }
    @keyframes mimeoPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(0,0,0,0); transform:scale(1); }
      50%     { box-shadow:0 0 0 6px rgba(0,0,0,0.06); transform:scale(1.15); }
    }
  </style>
